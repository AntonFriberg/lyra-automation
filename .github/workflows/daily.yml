name: Daily pipeline

on:
  schedule:
    # 7:00 UTC = ~9:00 CET (winter) / 8:00 CET (summer)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions: read-all

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          prune-cache: true

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(uv run python -c 'import playwright; print(playwright.__version__)')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            uv run playwright install chromium          # binary cached; skip OS deps
          else
            uv run playwright install --with-deps chromium
          fi

      - name: Run daily pipeline
        env:
          LYRA_EMAIL: ${{ secrets.LYRA_EMAIL }}
          LYRA_PASSWORD: ${{ secrets.LYRA_PASSWORD }}
          JM_EMAIL: ${{ secrets.JM_EMAIL }}
          JM_PASSWORD: ${{ secrets.JM_PASSWORD }}
          SEAM_API_KEY: ${{ secrets.SEAM_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HEADLESS: "true"
        run: uv run python -m lyra daily
