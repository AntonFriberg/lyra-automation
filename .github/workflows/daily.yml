name: Daily pipeline

on:
  schedule:
    # 7:00 UTC = ~9:00 CET (winter) / 8:00 CET (summer)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions: read-all

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set image name (lowercase)
        run: |
          echo "IMAGE=ghcr.io/${OWNER,,}/lyra-daily:latest" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run daily pipeline
        run: >
          docker run --rm
          -e LYRA_EMAIL="${{ secrets.LYRA_EMAIL }}"
          -e LYRA_PASSWORD="${{ secrets.LYRA_PASSWORD }}"
          -e JM_EMAIL="${{ secrets.JM_EMAIL }}"
          -e JM_PASSWORD="${{ secrets.JM_PASSWORD }}"
          -e SEAM_API_KEY="${{ secrets.SEAM_API_KEY }}"
          -e GMAIL_USER="${{ secrets.GMAIL_USER }}"
          -e GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}"
          -e HEADLESS=true
          ${{ env.IMAGE }}
